name: validate

on:
  pull_request:
    paths:
      - "content/**"
      - "audit/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
